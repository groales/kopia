services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - KOPIA_PASSWORD=${KOPIA_REPOSITORY_PASSWORD}
      - USER=${KOPIA_USER:-admin}
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ${KOPIA_REPOSITORY_PATH}:/repository
      - ${KOPIA_DATA_PATH}:/data:ro
      # Para browsing/mount de snapshots via FUSE
      - ./tmp:/tmp:shared
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    # Puertos expuestos para acceso directo (opcional, se recomienda usar proxy inverso)
    ports:
      - 51515:51515
    command:
      - server
      - start
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=${KOPIA_USER:-admin}
      - --server-password=${KOPIA_SERVER_PASSWORD}

# Anadir estas lineas para red externa de proxy inverso
networks:
  default:
    external: true
    name: proxy
