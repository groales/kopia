services:
    kopia:
        image: kopia/kopia:latest
        hostname: ${HOSTNAME:-kopia}
        container_name: ${CONTAINER_NAME:-kopia}
        restart: unless-stopped
        ports:
            - 51515:51515
        # Setup the server that provides the web gui
        command:
            - server
            - start
            - --disable-csrf-token-checks
            - --insecure
            - --address=0.0.0.0:51515
            - --server-username=${USERNAME:-admin}
            - --server-password=${SECRET_PASSWORD}
        environment:
            # Set repository password
            KOPIA_PASSWORD: ${SECRET}
            USER: ${USERNAME:-admin}
        volumes:
            # Mount local folders needed by kopia
            - ./config:/app/config
            - ./cache:/app/cache
            - ./logs:/app/logs
            # Mount local folders to snapshot
            - ${KOPIA_DATA_DIR}:/data:ro
            # Mount repository location
            - ${KOPIA_REPOSITORY_DIR}:/repository

# Anadir estas lineas para red externa de proxy inverso
networks:
  default:
    external: true
    name: proxy
